[tox]
requires =
    tox>=4
    tox-uv
env_list = pytest, mypy, ruff

[testenv:pytest]
description = Run tests with pytest
deps =
    pytest
    pytest-django
commands =
    pytest {posargs:-v}

[testenv:mypy]
description = Run type checking with mypy
deps =
    mypy
    django-stubs
commands =
    mypy email_domain_checker {posargs}

[testenv:ruff]
description = Run linting with ruff
deps =
    ruff
skip_install = true
commands =
    ruff check email_domain_checker tests {posargs}
